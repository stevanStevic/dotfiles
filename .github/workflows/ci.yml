name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x --source-path=SCRIPTDIR \
            bootstrap.sh \
            install.sh \
            uninstall.sh \
            lib/*.sh \
            modules/*.sh \
            test/*.sh
