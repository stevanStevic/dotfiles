# ==========================================
#  TMUX CONFIGURATION
# ==========================================

# --- PREFIX REMAP ---
# Unbind the default Ctrl+b
unbind C-b
# Set the new prefix to Ctrl+a
set-option -g prefix C-a
# Ensure we can still send Ctrl+a to other apps by pressing it twice
bind-key C-a send-prefix

# --- PANE SPLITTING ---
# Use | and - to split. Visually makes sense and keeps current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Unbind default awkward keys
unbind '"'
unbind %

# --- SESSION SWITCHING ---
# Jump directly to specific workflow sessions
bind p switch-client -t proxies
bind w switch-client -t workspace

# --- QUICK RELOAD ---
# Reload this config file without restarting tmux
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# --- SMART PANE SWITCHING (NEOVIM/VIM) ---
# Smart pane switching with awareness of Neovim splits.
# This prevents tmux from 'eating' the keys when you are inside Neovim.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'

# Also handle the keys correctly when inside 'Copy Mode'
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# --- MOUSE ---
# Enable mouse: scroll wheel auto-enters copy mode, selection confined to pane
# Hold Shift in Ghostty to bypass tmux mouse handling for native terminal selection
set -g mouse on

# --- CLIPBOARD & TERMINAL ---
# Allow programs (like Neovim) to access the system clipboard via OSC 52
set -s set-clipboard on

setw -g mode-keys vi

# Vi copy mode bindings
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Use tmux-256color instead of screen-256color for better Ghostty/Neovim support
# (enables italics, truecolor, and proper feature detection)
set -g default-terminal "tmux-256color"
set -as terminal-features ',tmux-256color:RGB'

# --- QUALITY OF LIFE ---
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Start window and pane numbering at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Auto-renumber windows when one is closed (no gaps in numbering)
set -g renumber-windows on
